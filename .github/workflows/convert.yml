name: Emacs ox-publish
on: [push]

jobs:
  publish:
    runs-on: ubuntu-latest
    # ESTO ES LO QUE FALTA: Permisos explícitos para escribir en el repo
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4 # Actualizado a v4
        with:
          fetch-depth: 0 # Evita errores de "shallow clone" al empujar cambios

      - name: Install Emacs
        run: |
          sudo apt-get update
          sudo apt-get install -y emacs-nox

      - name: Publish Org to HTML
        run: emacs -Q --batch --load publish.el --funcall org-publish-all

      - name: Commit and Push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          git add .
          
          # Verificamos si hay cambios antes de intentar el commit
          if git diff --staged --quiet; then
            echo "Sin cambios detectados."
          else
            git commit -m "docs: emacs-publish update [skip ci]"
            # Usamos el token de forma segura sin reconfigurar el remote manualmente
            git push origin HEAD:main
          fi